name: 宀椾綅鎼滅储 & 椋炰功閫氱煡

on:
  schedule:
    - cron: '0 1 * * 1-5'   # UTC 01:00 = 鍖椾含鏃堕棿 09:00锛屽伐浣滄棩鎵ц
  workflow_dispatch:          # 鏀寔鎵嬪姩瑙﹀彂锛屾柟渚挎祴璇?
jobs:
  search-and-notify:
    runs-on: ubuntu-latest

    steps:
      # 鈹€鈹€ Step 1: 鎷夊彇浣犵殑涓氬姟浠ｇ爜 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: Checkout
        uses: actions/checkout@v4

      # 鈹€鈹€ Step 2: 杩愯浣犺嚜宸辩殑宀椾綅鎼滅储鑴氭湰 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install job-search dependencies
        run: pip install -r requirements.txt

      - name: Run job search
        id: search
        run: |
          # 浣犵殑鎼滅储鑴氭湰锛屾妸鎽樿鍜岃缁嗗瓧娈靛垎鍒緭鍑哄埌 GITHUB_OUTPUT
          python search_jobs.py

          # search_jobs.py 鍐呴儴搴斿啓鍏ョ被浼硷細
          #   echo "summary=浠婃棩鍏辨壘鍒?5 涓墠绔矖浣? >> $GITHUB_OUTPUT
          #   echo "fields={\"鑱屼綅\":\"鍓嶇宸ョ▼甯圽",\"鍏徃\":\"瀛楄妭璺冲姩\",\"钖祫\":\"30k\",\"鏃ユ湡\":\"$(date +%F)\"}" >> $GITHUB_OUTPUT

      # 鈹€鈹€ Step 3: 鍙戦€佹憳瑕佹秷鎭埌椋炰功缇わ紙澶嶇敤 feishu-bot-action锛夆攢鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      - name: 鎺ㄩ€佹憳瑕佸埌椋炰功缇?        uses: rhu2xx/feishu-bot-action@v1   # 鈫?鏇挎崲涓轰綘鍙戝竷鍚庣殑浠撳簱鍦板潃
        with:
          action: send_message
          webhook_url:      ${{ secrets.FEISHU_WEBHOOK_URL }}
          webhook_sign_key: ${{ secrets.FEISHU_SIGN_KEY }}    # 娌″紑绛惧悕鏍￠獙鍙笉濉?          msg_type: interactive
          # 浼犵畝鍗?JSON锛宐ot 浼氳嚜鍔ㄦ瀯閫犲崱鐗?          msg_content: |
            {
              "title": "馃攳 姣忔棩宀椾綅鎾姤",
              "content": "${{ steps.search.outputs.summary }}",
              "color": "blue"
            }

      # 鈹€鈹€ Step 4: 鎶婅缁嗙粨鏋滃啓鍏ラ涔﹀缁磋〃鏍煎瓨妗ｏ紙澶嶇敤 feishu-bot-action锛夆攢鈹€鈹€
      - name: 鍐欏叆椋炰功澶氱淮琛ㄦ牸
        uses: rhu2xx/feishu-bot-action@v1
        with:
          action: append_bitable_row
          app_id:            ${{ secrets.FEISHU_APP_ID }}
          app_secret:        ${{ secrets.FEISHU_APP_SECRET }}
          bitable_app_token: ${{ secrets.BITABLE_APP_TOKEN }}
          bitable_table_id:  ${{ secrets.BITABLE_TABLE_ID }}
          bitable_fields:    ${{ steps.search.outputs.fields }}

      # 鈹€鈹€ Step 5锛堝彲閫夛級锛氭洿鏂板凡鏈夎鐨勭姸鎬?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
      # - name: 鏇存柊澶氱淮琛ㄦ牸琛岀姸鎬?      #   uses: rhu2xx/feishu-bot-action@v1
      #   with:
      #     action: update_bitable_row
      #     app_id:            ${{ secrets.FEISHU_APP_ID }}
      #     app_secret:        ${{ secrets.FEISHU_APP_SECRET }}
      #     bitable_app_token: ${{ secrets.BITABLE_APP_TOKEN }}
      #     bitable_table_id:  ${{ secrets.BITABLE_TABLE_ID }}
      #     bitable_record_id: ${{ steps.write.outputs.record_id }}
