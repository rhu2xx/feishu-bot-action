  record_id:
    description: 'append_bitable_row 鎴愬姛鍚庤繑鍥炵殑鏂拌 record_id锛屽彲浼犵粰鍚庣画 step'
  response:
    description: '椋炰功 API 鐨勫師濮嬪搷搴旓紙JSON 瀛楃涓诧級锛岀敤浜庤皟璇?

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run feishu bot
      shell: bash
      run: python ${{ github.action_path }}/src/main.py
      env:
        INPUT_ACTION:            ${{ inputs.action }}
        INPUT_WEBHOOK_URL:       ${{ inputs.webhook_url }}
        INPUT_WEBHOOK_SIGN_KEY:  ${{ inputs.webhook_sign_key }}
        INPUT_MSG_TYPE:          ${{ inputs.msg_type }}
        INPUT_MSG_CONTENT:       ${{ inputs.msg_content }}
        INPUT_APP_ID:            ${{ inputs.app_id }}
        INPUT_APP_SECRET:        ${{ inputs.app_secret }}
        INPUT_BITABLE_APP_TOKEN: ${{ inputs.bitable_app_token }}
        INPUT_BITABLE_TABLE_ID:  ${{ inputs.bitable_table_id }}
        INPUT_BITABLE_FIELDS:    ${{ inputs.bitable_fields }}
        INPUT_BITABLE_RECORD_ID: ${{ inputs.bitable_record_id }}
